<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>精簡計算機</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .calculator {
            background-color: #333;
            width: 90%;
            max-width: 360px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #process {
            text-align: right;
            color: #aaa;
            font-size: 1.1rem;
            min-height: 1.2rem;
            margin-bottom: 5px;
        }
        /* 核心修改：設定顯示框容器與自動縮放字體 */
        .display-container {
            width: 100%;
            background: #222;
            border-radius: 8px;
            margin-bottom: 20px;
            padding: 10px;
            box-sizing: border-box;
            height: 80px; /* 固定高度防止跳動 */
            display: flex;
            align-items: center;
            justify-content: flex-end;
            overflow: hidden;
        }
        #display {
            color: #fff;
            font-size: 3rem; /* 初始大字體 */
            text-align: right;
            white-space: nowrap;
            transition: font-size 0.1s ease; /* 縮放時平滑一點 */
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            height: 65px;
            font-size: 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            background-color: #444;
            transition: opacity 0.1s;
        }
        button:active { opacity: 0.7; }
        .num { background-color: #222; }
        .ac { background-color: #e58e9d; color: #fff; }
        .op { background-color: #555; }
        .equal { background-color: #555; }
    </style>
</head>
<body>

<div class="calculator">
    <div id="process"></div>
    <div class="display-container">
        <div id="display">0</div>
    </div>
    
    <div class="buttons">
        <button class="ac" onclick="clearAll()">AC</button>
        <button class="op" onclick="appendValue('%')">%</button>
        <button class="op" onclick="deleteLast()">OFF</button>
        <button class="op" onclick="appendValue('÷')">÷</button>
        
        <button class="num" onclick="appendValue('7')">7</button>
        <button class="num" onclick="appendValue('8')">8</button>
        <button class="num" onclick="appendValue('9')">9</button>
        <button class="op" onclick="appendValue('×')">×</button>
        
        <button class="num" onclick="appendValue('4')">4</button>
        <button class="num" onclick="appendValue('5')">5</button>
        <button class="num" onclick="appendValue('6')">6</button>
        <button class="op" onclick="appendValue('-')">-</button>
        
        <button class="num" onclick="appendValue('1')">1</button>
        <button class="num" onclick="appendValue('2')">2</button>
        <button class="num" onclick="appendValue('3')">3</button>
        <button class="op" onclick="appendValue('+')">+</button>
        
        <button class="num" onclick="appendValue('0')">0</button>
        <button class="num" onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()" style="grid-column: span 2;">=</button>
    </div>
</div>

<script>
    let currentInput = "";
    const display = document.getElementById('display');
    const processDisplay = document.getElementById('process');

    // 自動縮放字體的邏輯
    function adjustFontSize() {
        const length = display.innerText.length;
        if (length > 12) {
            display.style.fontSize = "1.5rem"; // 字多變超小
        } else if (length > 8) {
            display.style.fontSize = "2rem";   // 字中等變小
        } else {
            display.style.fontSize = "3rem";   // 初始大字
        }
    }

    function appendValue(val) {
        if (currentInput === "" && ['+', '×', '÷', '%'].includes(val)) return;
        currentInput += val;
        updateDisplay();
    }

    function clearAll() {
        currentInput = "";
        processDisplay.innerText = "";
        display.innerText = "0";
        adjustFontSize();
    }

    function deleteLast() {
        currentInput = currentInput.slice(0, -1);
        updateDisplay();
        if (currentInput === "") display.innerText = "0";
    }

    function updateDisplay() {
        display.innerText = currentInput;
        adjustFontSize();
    }

    function calculate() {
        try {
            if (currentInput === "") return;
            // 轉換符號進行計算
            let expression = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
            const result = eval(expression);
            processDisplay.innerText = currentInput + " =";
            currentInput = result.toString();
            display.innerText = currentInput;
            adjustFontSize();
        } catch (e) {
            display.innerText = "錯誤";
            setTimeout(clearAll, 1000);
        }
    }
</script>

</body>
</html>
